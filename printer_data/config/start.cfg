# https://config.gab-3d.com/share/39f3eb58-4e78-44a6-88a7-281513add9f8

[gcode_macro PRINT_START]
gcode:
    # 1. Fetch parameters from the Slicer
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(210)|float %}
    {% set MATERIAL = params.MATERIAL|default("PLA")|string %}

    # 2. Start bed heating and set nozzle to standby (150C) to prevent oozing
    M140 S{BED_TEMP}
    M104 S150 
    G90 ; Use absolute coordinates
    
    # 3. Home all axes
    G28 

    # 4. Wait for bed to reach target temperature
    M190 S{BED_TEMP}

    # NEW: Wait for Eddy to reach at least 40C so it's stable
    TEMPERATURE_WAIT SENSOR="temperature_probe btt_eddy" MINIMUM=40

    # 5. Perform a Rapid Scan Bed Mesh with BTT Eddy
    # This replaces the old G29/M420 commands
    BED_MESH_CALIBRATE METHOD=rapid_scan
    BED_MESH_PROFILE LOAD=default
    
    # 6. Apply Pressure Advance settings based on material type
    MATERIAL_PA MATERIAL={MATERIAL}

    # 7. Move to start position and wait for final nozzle temperature
    G1 X2 Y20 Z5 F5000 
    M109 S{EXTRUDER_TEMP}

    # 8. Run the prime line macro
    _PURGE_LINE

[gcode_macro _PURGE_LINE]
gcode:
  {% if printer["gcode_macro status_cleaning"] != null %}
    status_cleaning
  {% endif %}
  SAVE_GCODE_STATE NAME=Pre_Prime
  SET_LED LED=extruder RED=1 GREEN=1 BLUE=1
        
  G92 E0 ; reset extruder
  G1 Z50 F3000 ; move z up little to prevent scratching of surface
  # G1 X2 Y25 Z0.3 F5000.0 ; move to start-line position
  # G1 X2 Y275.0 Z0.3 F1500.0 E40 ; draw 1st line
  G1 X2.5 Y200.0 Z0.3 F5000.0 ; move to side a little
  G92 E0 ; reset extruder
  G1 X2.5 Y100 Z0.3 F1500.0 E40 ; draw 2nd line
  G92 E0 ; reset extruder
  #G1 E-3 F2400 ; retract
  #G92 E0 ; reset extruder
  G1 Z1.0 F3000 ; move z up little to prevent scratching of surface
  RESTORE_GCODE_STATE NAME=Pre_Prime

  {% if printer["gcode_macro status_printing"] != null %}
    status_printing
  {% endif %}

[gcode_macro SET_LED_TO_WHITE]
gcode:
  SET_LED LED=extruder RED=1 GREEN=1 BLUE=1
